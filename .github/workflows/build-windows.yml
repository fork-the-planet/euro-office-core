name: Build (Windows x64)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      PYTHONUTF8: "1"

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------ #
      # 2. Install Cygwin FIRST — its installer prepends C:\cygwin\bin to
      #    PATH, which shadows Windows Python and Strawberry Perl.
      #    We fix the ordering immediately after in step 3.
      # ------------------------------------------------------------------ #
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: >-
            automake
            cmake
            make
            git
            python3
            python3-devel

      # ------------------------------------------------------------------ #
      # 3. Fix PATH ordering
      #    Put Strawberry Perl and Windows Python BEFORE Cygwin so that
      #    bare "perl" / "python" resolve to the Windows-native versions,
      #    while Cygwin tools are still reachable via full path or when
      #    ICU/vcpkg explicitly needs them.
      # ------------------------------------------------------------------ #
      - name: Fix PATH — Windows tools before Cygwin
        shell: pwsh
        run: |
          $current = $env:PATH -split ';'

          # Buckets — order within each group is preserved
          $strawberry = $current | Where-Object { $_ -match 'Strawberry' }
          $winPython  = $current | Where-Object { $_ -match 'Python3\d\d?' -or $_ -match '\\Python\\' }
          $winGit     = $current | Where-Object { $_ -match 'Git\\' }
          $cygwin     = $current | Where-Object { $_ -match 'cygwin' }
          $rest       = $current | Where-Object {
                            $_ -notmatch 'Strawberry' -and
                            $_ -notmatch 'Python3\d\d?' -and
                            $_ -notmatch '\\Python\\' -and
                            $_ -notmatch 'Git\\' -and
                            $_ -notmatch 'cygwin'
                        }

          $ordered = ($strawberry + $winPython + $winGit + $rest + $cygwin) |
                     Where-Object { $_ -ne '' } |
                     Select-Object -Unique

          $newPath = $ordered -join ';'
          echo "PATH=$newPath" >> $env:GITHUB_ENV
          Write-Host "New PATH (first 8 entries):"
          $ordered | Select-Object -First 8 | ForEach-Object { Write-Host "  $_" }

      # ------------------------------------------------------------------ #
      # 4. Install Windows SDK 10.0.19041.0
      #    windows-latest ships VS 2022 / MSVC 14.4x already.
      #    This step adds the specific SDK if it isn't already present.
      # ------------------------------------------------------------------ #
      - name: Install Windows SDK 10.0.19041.0
        shell: pwsh
        run: |
          $vsWhere    = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = & $vsWhere -latest -property installationPath
          Write-Host "VS install path: $installPath"
          & $vsInstaller modify `
            --installPath $installPath `
            --add Microsoft.VisualStudio.Component.Windows10SDK.19041 `
            --quiet --norestart --force
          # Exit code 3010 = restart required but changes applied — treat as success
          if ($LASTEXITCODE -notin @(0, 3010)) {
            Write-Warning "vs_installer returned $LASTEXITCODE — SDK may already be installed, continuing."
          }

      # ------------------------------------------------------------------ #
      # 5. Verify tool versions
      #    - Strawberry Perl  (Windows native)
      #    - Python           (Windows native, via 'py' launcher)
      #    - Git for Windows
      #    - CMake
      # ------------------------------------------------------------------ #
      - name: Verify tool versions
        shell: pwsh
        run: |
          Write-Host "--- Strawberry Perl (Windows) ---"
          $perlVer = perl --version | Select-String 'This is perl'
          Write-Host $perlVer
          if ($perlVer -match 'cygwin') { throw "ERROR: 'perl' resolved to Cygwin Perl — PATH fix failed." }

          Write-Host "--- Python (Windows, via py launcher) ---"
          py --version

          Write-Host "--- Git for Windows ---"
          git --version

          Write-Host "--- CMake ---"
          cmake --version

          Write-Host "--- Cygwin python3 (sanity check) ---"
          C:\cygwin\bin\python3 --version

      # ------------------------------------------------------------------ #
      # 6. Set up vcpkg  (mirrors the Linux workflow's lukka/run-vcpkg)
      # ------------------------------------------------------------------ #
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11

      # ------------------------------------------------------------------ #
      # 7. CMake Configure
      #    Runs inside the x64 Native Tools shell (vcvars64.bat) so that
      #    cl.exe 19.44, link.exe, and the correct SDK headers are on PATH.
      # ------------------------------------------------------------------ #
      - name: CMake Configure
        shell: cmd
        run: |
          :: Activate x64 Native Tools (MSVC 14.44 / cl 19.44)
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          if errorlevel 1 (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          )
          if errorlevel 1 (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          )

          set PYTHONUTF8=1

          cmake -G "Visual Studio 17 2022" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DVCPKG_MANIFEST=ON ^
            -DVCPKG_MANIFEST_DIR=. ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DEO_CORE_OUTPUT_DIR=.\package\bin ^
            -DEO_CORE_TOOLS_DIR=.\package\tools

      # ------------------------------------------------------------------ #
      # 8. CMake Build
      # ------------------------------------------------------------------ #
      - name: CMake Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          if errorlevel 1 (
            call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          )
          if errorlevel 1 (
            call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          )

          set PYTHONUTF8=1

          cmake --build . --config Release --parallel

      # ------------------------------------------------------------------ #
      # 9. Upload build artifacts
      # ------------------------------------------------------------------ #
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output-windows
          path: |
            package/bin/
            package/tools/
          if-no-files-found: warn