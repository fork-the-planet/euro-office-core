name: Build (Windows x64)

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    env:
      PYTHONUTF8: "1"

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------ #
      # 2. Install Cygwin WITHOUT touching PATH.
      #
      #    By default cygwin-install-action PREPENDS C:\cygwin\bin to PATH,
      #    which makes Cygwin's perl/python/git/cmake shadow the Windows-
      #    native tools no matter what we do afterwards. add-to-path: false
      #    stops that at the source — no shim renaming needed.
      # ------------------------------------------------------------------ #
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v4
        with:
          # Pin the install location explicitly. The action's default has
          # changed between versions (C:\cygwin, later D:\cygwin), while
          # most build scripts that shell out to Cygwin assume the stock
          # installer location C:\cygwin64. A hardcoded path that doesn't
          # exist is exactly what produces Windows error 3:
          # "The system cannot find the path specified."
          install-dir: 'C:\cygwin64'
          add-to-path: false
          packages: >-
            automake
            cmake
            make
            git
            python3
            python3-devel

      # ------------------------------------------------------------------ #
      # 3. Build a deterministic PATH:
      #      [native perl/python/git/cmake dirs] ; [Cygwin] ; [everything else]
      #
      #    Why not just append Cygwin at the end? Because the runner image
      #    already has Git's MSYS tools (C:\Program Files\Git\usr\bin) in
      #    PATH — with Cygwin last, a bare `bash`/`sh` resolves to Git's
      #    MSYS bash, which is NOT a valid substitute for a Cygwin/MSVC
      #    build of ICU. This ordering gives Cygwin's bash/make/sh priority
      #    while the four conflicting tools stay Windows-native.
      #
      #    CYGWIN_ROOT is exported for build scripts that locate Cygwin
      #    via an environment variable instead of PATH.
      # ------------------------------------------------------------------ #
      - name: Set up PATH ordering (native tools > Cygwin > rest)
        shell: pwsh
        run: |
          $cyg = 'C:\cygwin64'
          $nativeDirs = @()
          foreach ($tool in 'perl', 'python', 'git', 'cmake') {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($cmd -and ($cmd.Source -notlike "$cyg\*")) {
              $dir = Split-Path $cmd.Source
              if ($nativeDirs -notcontains $dir) { $nativeDirs += $dir }
              Write-Host ("native {0,-8} -> {1}" -f $tool, $cmd.Source)
            }
          }
          $newPath = ($nativeDirs + "$cyg\bin" + $env:PATH) -join ';'
          "PATH=$newPath"      | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CYGWIN_ROOT=$cyg"   | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ------------------------------------------------------------------ #
      # 4. Install Windows SDK 10.0.19041.0
      # ------------------------------------------------------------------ #
      - name: Install Windows SDK 10.0.19041.0
        shell: pwsh
        run: |
          $vsWhere     = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = & $vsWhere -latest -products * -property installationPath
          Write-Host "VS install path: $installPath"
          & $vsInstaller modify `
            --installPath $installPath `
            --add Microsoft.VisualStudio.Component.Windows10SDK.19041 `
            --quiet --norestart --force
          if ($LASTEXITCODE -notin @(0, 3010)) {
            Write-Warning "vs_installer returned $LASTEXITCODE — SDK may already be installed, continuing."
          }

      # ------------------------------------------------------------------ #
      # 5. Verify tool resolution — Get-Command shows exactly which binary
      #    each bare name resolves to, so failures are self-explanatory.
      # ------------------------------------------------------------------ #
      - name: Verify tool versions
        shell: pwsh
        run: |
          foreach ($tool in 'perl', 'python', 'git', 'cmake') {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($cmd) {
              Write-Host ("{0,-8} -> {1}" -f $tool, $cmd.Source)
              if ($cmd.Source -like 'C:\cygwin64\*') {
                throw "ERROR: '$tool' resolves to the Cygwin copy at $($cmd.Source)."
              }
            } else {
              Write-Host ("{0,-8} -> (not found in PATH)" -f $tool)
            }
          }

          # These SHOULD be the Cygwin copies (ICU's Cygwin/MSVC build needs them)
          foreach ($tool in 'bash', 'sh', 'make') {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($cmd) {
              Write-Host ("{0,-8} -> {1}" -f $tool, $cmd.Source)
              if ($cmd.Source -notlike 'C:\cygwin64\*') {
                throw "ERROR: '$tool' resolves to a non-Cygwin copy at $($cmd.Source)."
              }
            } else {
              throw "ERROR: '$tool' not found in PATH."
            }
          }

          Write-Host "--- perl ---"
          perl --version | Select-String 'This is perl'
          $perlOut = (perl --version) -join ''
          if ($perlOut -match 'cygwin') {
            throw "ERROR: 'perl' is Cygwin Perl."
          }

          Write-Host "--- python ---"
          python --version
          py --version

          Write-Host "--- git ---"
          git --version

          Write-Host "--- cmake ---"
          cmake --version

          # NB: don't try to run C:\cygwin64\bin\python3 directly from pwsh —
          # it's a Cygwin-style symlink that cmd/pwsh can't execute. If you
          # ever need Cygwin python, call it via:
          #   C:\cygwin64\bin\bash.exe -lc 'python3 --version'

      # ------------------------------------------------------------------ #
      # 6. Set up vcpkg  (matches the Linux workflow)
      # ------------------------------------------------------------------ #
      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11

      # ------------------------------------------------------------------ #
      # 7. CMake Configure
      #    vcvars64.bat is located via vswhere so the VS edition (Enterprise/
      #    Professional/Community) and future image changes don't matter.
      # ------------------------------------------------------------------ #
      - name: CMake Configure
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSPATH=%%i"
          echo Using VS at: %VSPATH%
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          if errorlevel 1 exit /b 1

          set PYTHONUTF8=1

          cmake -G "Visual Studio 17 2022" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DVCPKG_MANIFEST=ON ^
            -DVCPKG_MANIFEST_DIR=. ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DEO_CORE_OUTPUT_DIR=.\package\bin ^
            -DEO_CORE_TOOLS_DIR=.\package\tools

      # ------------------------------------------------------------------ #
      # 8. CMake Build
      # ------------------------------------------------------------------ #
      - name: CMake Build
        shell: cmd
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSPATH=%%i"
          call "%VSPATH%\VC\Auxiliary\Build\vcvars64.bat" 10.0.19041.0
          if errorlevel 1 exit /b 1

          set PYTHONUTF8=1

          cmake --build . --config Release --parallel

      # ------------------------------------------------------------------ #
      # 9. Upload build artifacts
      # ------------------------------------------------------------------ #
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output-windows
          path: |
            package/bin/
            package/tools/
          if-no-files-found: warn