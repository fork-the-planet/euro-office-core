name: Build (Windows x64)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      PYTHONUTF8: "1"
      # Adjust this to wherever vcpkg is bootstrapped (see steps below)
      VCPKG_ROOT: ${{ github.workspace }}\vcpkg

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------ #
      # 2. Install Visual Studio components + WinSDK 10.0.19041.0
      #    windows-latest already ships VS 2022 / MSVC 14.4x.
      #    We add the specific SDK version if it isn't present.
      # ------------------------------------------------------------------ #
      - name: Install Windows SDK 10.0.19041.0
        shell: pwsh
        run: |
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = & $vsWhere -latest -property installationPath
          Write-Host "VS install path: $installPath"
          # Add the SDK component (safe to run even if already present)
          & $vsInstaller modify `
            --installPath $installPath `
            --add Microsoft.VisualStudio.Component.Windows10SDK.19041 `
            --quiet --norestart --force
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Installer returned $LASTEXITCODE – SDK may already be installed, continuing."
          }

      # ------------------------------------------------------------------ #
      # 3. Install Cygwin (with the packages your ICU build needs)
      # ------------------------------------------------------------------ #
      - name: Install Cygwin
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: >-
            automake
            cmake
            make
            git
            python3
            python3-devel

      # ------------------------------------------------------------------ #
      # 4. Pre-installed tools sanity-check
      #    Strawberry Perl, Git for Windows and Python are already on the
      #    runner – just verify they're on PATH.
      # ------------------------------------------------------------------ #
      - name: Verify pre-installed tools
        shell: pwsh
        run: |
          Write-Host "--- Perl ---"
          perl --version | Select-Object -First 2

          Write-Host "--- Python ---"
          python --version

          Write-Host "--- Git ---"
          git --version

          Write-Host "--- CMake ---"
          cmake --version

      # ------------------------------------------------------------------ #
      # 5. Bootstrap vcpkg
      # ------------------------------------------------------------------ #
      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT")) {
            git clone https://github.com/microsoft/vcpkg.git "$env:VCPKG_ROOT"
          }
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat" -disableMetrics

      # ------------------------------------------------------------------ #
      # 6. Cache vcpkg installed packages (speeds up repeat builds)
      # ------------------------------------------------------------------ #
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}\installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      # 7. CMake configure  (runs inside the x64 Native Tools environment)
      # ------------------------------------------------------------------ #
      - name: CMake Configure
        shell: cmd
        run: |
          :: Load the x64 Native Tools environment (MSVC 14.4x, cl 19.44)
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"

          set PYTHONUTF8=1

          cmake -G "Visual Studio 17 2022" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DVCPKG_MANIFEST=ON ^
            -DVCPKG_MANIFEST_DIR=. ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake" ^
            -DEO_CORE_OUTPUT_DIR=.\package\bin ^
            -DEO_CORE_TOOLS_DIR=.\package\tools

      # ------------------------------------------------------------------ #
      # 8. CMake build
      # ------------------------------------------------------------------ #
      - name: CMake Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"

          set PYTHONUTF8=1

          cmake --build . --config Release --parallel

      # ------------------------------------------------------------------ #
      # 9. Upload build artifacts (optional – adjust path as needed)
      # ------------------------------------------------------------------ #
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            package/bin/
            package/tools/
          if-no-files-found: warn