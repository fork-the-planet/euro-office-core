name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: [ubuntu-latest, self-hosted]
    env:
      PLEASE_PRELOAD_LIBSTDCPP: true

    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
                git \
                curl \
                wget \
                ssh \
                build-essential \
                make \
                cmake \
                ninja-build \
                pkg-config \
                libglib2.0-dev \
                python3 \
                python-is-python3 \
                lsb-release \
                libboost-all-dev
    
    - name: Configure with CMake
      run: cmake -GNinja -S . -B build
    
    - name: Build
      run: cmake --build build

# 2. WebAssembly Build
  build-wasm:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Emscripten
      uses: emscripten-core/emsdk@v14
      with:
        version: latest
        # The action automatically adds emcc/emcmake to the PATH

    - name: Verify Emscripten
      run: emcc -v

    - name: Build with Emscripten
      run: |
        emcmake cmake -S . -B build-wasm
        
        cmake --build build-wasm