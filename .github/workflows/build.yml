name: Build

on:
  pull_request:

jobs:
  build:
    runs-on: self-hosted
    env:
      PLEASE_PRELOAD_LIBSTDCPP: true
      CC: clang-13
      CXX: clang++-13

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
                git \
                curl \
                wget \
                ssh \
                build-essential \
                make \
                cmake \
                ninja-build \
                pkg-config \
                libglib2.0-dev \
                python3 \
                python-is-python3 \
                lsb-release \
                libboost-all-dev
    
    - name: Install clang-13 and LLVM tools for V8 9.x build
      run: |
        wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm-snapshot.gpg
        echo "deb [signed-by=/etc/apt/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-13 main" | sudo tee /etc/apt/sources.list.d/llvm-13.list
        sudo apt-get update && sudo apt-get install -y \
            clang-13 lld-13 llvm-13-dev llvm-13 \
            libc++-13-dev libc++abi-13-dev \
            qemu-user-static binfmt-support
        
        # Create symlinks so V8 build script can find clang-13 and LLVM toolchain
        sudo ln -sf /usr/bin/clang-13 /usr/bin/clang
        sudo ln -sf /usr/bin/clang++-13 /usr/bin/clang++
        sudo ln -sf /usr/bin/lld-13 /usr/bin/lld
        sudo ln -sf /usr/bin/llvm-ar-13 /usr/bin/llvm-ar
        sudo ln -sf /usr/bin/llvm-nm-13 /usr/bin/llvm-nm
        sudo ln -sf /usr/bin/llvm-ranlib-13 /usr/bin/llvm-ranlib

        # Ensure alternatives are set for clang/llvm if available
        sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-13 100 || true
        sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-13 100 || true
        sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-13 100 || true
        sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-13 100 || true
        sudo update-alternatives --install /usr/bin/llvm-ranlib llvm-ranlib /usr/bin/llvm-ranlib-13 100 || true
        sudo update-alternatives --install /usr/bin/lld lld /usr/bin/lld-13 100 || true
    - name: Verify clang version
      run: |
        clang-13 --version
        clang --version
    - name: Configure core, build third_party libs (ICU, V8, etc.)
      run: |
        cmake -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS_RELEASE="-O3 -w" \
          -DCMAKE_C_FLAGS_RELEASE="-O3 -w" \
          -DEO_CORE_OUTPUT_DIR=/package/bin \
          -DEO_CORE_TOOLS_DIR=/package/tools \
          .

    - name: Build
      run: cmake --build build

    - name: Conversion Test
      run: ./Test/Applications/x2tTester/conversionTest.sh ./Test/Applications/x2tTester ../../../build/package
    - name: Build core (x2t, docbuilder, etc.)
      run: |
        cmake --build .
# 2. WebAssembly Build
  build-wasm:
    runs-on: [ubuntu-latest, self-hosted]
    container:
        image: emscripten/emsdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          path: core/

      - name: Checkout sdkjs repository
        uses: actions/checkout@v6
        with:
          repository: euro-office/sdkjs
          ref: fork
          path: sdkjs/
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Verify Emscripten
        run: emcc -v

      - name: Build with Emscripten
        run: |
          mkdir -p ../build-wasm-dir
          cd ../build-wasm-dir
          /bin/bash -c "emcmake cmake -S $GITHUB_WORKSPACE/core -B . -DEO_CORE_OUTPUT_DIR=$GITHUB_WORKSPACE/package && cmake --build ."
        shell: bash
