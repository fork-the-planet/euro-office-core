name: Build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PLEASE_PRELOAD_LIBSTDCPP: true
      CC: clang-13
      CXX: clang++-13

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
                git \
                curl \
                wget \
                ssh \
                build-essential \
                make \
                cmake \
                ninja-build \
                pkg-config \
                libglib2.0-dev \
                python3 \
                python-is-python3 \
                lsb-release \
                libboost-all-dev
    
    - name: Install clang-13 and LLVM tools for V8 9.x build
      run: |
        wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/llvm-snapshot.gpg
        echo "deb [signed-by=/etc/apt/keyrings/llvm-snapshot.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-13 main" | sudo tee /etc/apt/sources.list.d/llvm-13.list
        sudo apt-get update && sudo apt-get install -y \
            clang-13 lld-13 llvm-13-dev libc++-13-dev libc++abi-13-dev \
            llvm-tools binutils
        
        # Create symlinks so V8 build script can find clang++-13
        sudo ln -sf /usr/bin/clang-13 /usr/bin/clang++-13
        sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-13 100 || true
        sudo update-alternatives --install /usr/bin/cxx cxx /usr/bin/clang++-13 100 || true
        
        # Verify clang++-13 is available
        ls -la /usr/bin/clang* | head -20

    - name: Configure with CMake (uses CC/CXX env vars)
      run: |
        cmake -GNinja -S . -B build
        
    - name: Build
      run: cmake --build build

    - name: Conversion Test
      run: ./Test/Applications/x2tTester/conversionTest.sh ./Test/Applications/x2tTester ../../../build/package
