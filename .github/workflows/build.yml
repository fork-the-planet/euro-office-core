name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: [ubuntu-latest, self-hosted]
    env:
      PLEASE_PRELOAD_LIBSTDCPP: true

    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
                git \
                curl \
                wget \
                ssh \
                build-essential \
                make \
                cmake \
                ninja-build \
                pkg-config \
                libglib2.0-dev \
                python3 \
                python-is-python3 \
                lsb-release \
                libboost-all-dev
    
    - name: Configure with CMake
      run: cmake -GNinja -S . -B build
    
    - name: Build
      run: cmake --build build

# 2. WebAssembly Build
  build-wasm:
    runs-on: [ubuntu-latest, self-hosted]
    container:
        image: emscripten/emsdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          path: core/

      - name: Checkout sdkjs repository
        uses: actions/checkout@v6
        with:
          repository: euro-office/sdkjs
          ref: fork
          path: sdkjs/
          token: ${{ secrets.EURO_OFFICE_MIRROR_TOKEN }}

      - name: Verify Emscripten
        run: emcc -v

      - name: Build with Emscripten
        run: |
          mkdir -p ../build-wasm-dir
          cd ../build-wasm-dir
          /bin/bash -c "emcmake cmake -S $GITHUB_WORKSPACE/core -B . -DEO_CORE_OUTPUT_DIR=$GITHUB_WORKSPACE/package && cmake --build ."
        shell: bash